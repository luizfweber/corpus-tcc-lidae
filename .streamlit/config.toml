# Configuração de tema e layout — Streamlit
# Identidade visual: NECPF (Verde-floresta, Azul-teal, Âmbar, Terracota)

[theme]
# Cores — Identidade Visual NECPF
primaryColor = "#1A7A8A"            # Azul-teal (links, botões, destaques)
backgroundColor = "#F7F8F6"         # Neutro-50 (fundo claro)
secondaryBackgroundColor = "#FFFFFF" # Neutro-0 (cards, widgets)
textColor = "#363A33"               # Neutro-700 (texto principal)
font = "sans serif"                 # Inter ou Open Sans (corpo)

[client]
# Layout padrão
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

# ───────────────────────────────────────────────────────────────────────────
# PERSONALIZAÇÕES COMUNS
# ───────────────────────────────────────────────────────────────────────────
# Para layout WIDE (aproveita toda a tela):
#   Descomente a linha abaixo no arquivo dashboard.py:
#   st.set_page_config(layout="wide")
#
# Para tema ESCURO:
#   Descomente abaixo e defina darkMode = true:
#   [theme]
#   darkMode = true
#   primaryColor = "#4AABDB"
#
# Para mudar a fonte (monospace para código):
#   font = "monospace"
#
# Para mudar cor do título/cabeçalho:
#   Adicione no topo do dashboard.py:
#   st.markdown("""
#   <style>
#   .css-10trblm { color: #2C6E91; }  /* h1 */
#   </style>
#   """, unsafe_allow_html=True)
